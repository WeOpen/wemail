name: Preview Build

on:
  pull_request:

permissions:
  contents: read
  deployments: write

jobs:
  preview-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build

      - name: Upload preview bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-preview-bundle
          path: apps/web/dist
          retention-days: 7

      - name: Deploy Pages preview via Wrangler
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}
        id: deploy_preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy apps/web/dist
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=pr-${{ github.event.pull_request.number }}

      - name: Write preview summary
        if: ${{ steps.deploy_preview.outcome == 'success' }}
        run: |
          echo "## Cloudflare Preview" >> $GITHUB_STEP_SUMMARY
          echo "Deployment URL: ${{ steps.deploy_preview.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          echo "Alias URL: ${{ steps.deploy_preview.outputs.pages-deployment-alias-url }}" >> $GITHUB_STEP_SUMMARY

      - name: Preview skipped summary
        if: ${{ !(secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_PAGES_PROJECT_NAME != '') }}
        run: |
          echo "## Cloudflare Preview" >> $GITHUB_STEP_SUMMARY
          echo "Preview deployment skipped because required Cloudflare secrets are not configured." >> $GITHUB_STEP_SUMMARY
