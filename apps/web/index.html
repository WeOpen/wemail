<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeMail</title>
    <meta
      name="description"
      content="WeMail is an operator-friendly edge mail workspace for temporary inboxes, outbound control, and admin oversight."
    />
    <meta name="application-name" content="WeMail" />
    <meta name="theme-color" content="#ff7a00" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WeMail" />
    <meta
      property="og:description"
      content="Temporary inboxes, outbound control, and admin oversight in one operator-friendly workspace."
    />
    <meta property="og:image" content="/brand/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WeMail" />
    <meta
      name="twitter:description"
      content="Temporary inboxes, outbound control, and admin oversight in one operator-friendly workspace."
    />
    <meta name="twitter:image" content="/brand/og-image.svg" />
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/app-icon.svg" />
    <link rel="manifest" href="/brand/site.webmanifest" />
    <script>
      (() => {
        const key = "wemail-workspace-theme";
        const storedTheme = window.localStorage.getItem(key);
        const theme =
          storedTheme === "dark" || storedTheme === "light"
            ? storedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
